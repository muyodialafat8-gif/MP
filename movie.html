<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoviePulse - Premium Cinematic Platform</title>
    <script>
      const params = new URLSearchParams(window.location.search);
      // Determine filename
      const pageName = window.location.pathname.split('/').pop().replace('.html', '');
      window.location.href = "/?page=" + pageName + (params.toString() ? "&" + params.toString() : "");
    </script>
  </head>
  <body style="background:#0a0a0a; color:#fff; font-family:sans-serif; text-align:center; padding-top:20%;">
    <p>Preparing Cinematic Experience...</p>
  </body>
</html>
